<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Potwierdzenie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .success-box {
            background-color: #7aff82;
            border-radius: 4px;
            padding: 2rem;
            margin-top: 2rem;
            margin-bottom: 2rem;
        }
        .custom-link {
            color: #8A2BE2;
            text-decoration: none;
            font-weight: 500;
        }
        .custom-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body class="bg-light">
<div th:replace="~{fragments/nav :: navbar}"></div>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">

            <h3 class="fw-bold mb-4">Potwierdzenie</h3>

            <div class="success-box shadow-sm text-start">
                <h5 class="fw-bold text-dark mb-2">Dziękujemy!</h5>
                <p class="text-dark mb-0">Zlecenie zostało złożone pomyślnie.</p>
            </div>

            <div class="d-flex justify-content-center gap-4">
                <a href="/market" class="custom-link">Główna</a>

                <a th:href="@{/orders/history/{type}(type=${orderType.toString().toLowerCase()})}" class="custom-link">
                    Historia zleceń
                </a>
            </div>

        </div>
    </div>
</div>

<div th:replace="~{fragments/nav :: bootstrap-js}"></div>
</body>
</html>
